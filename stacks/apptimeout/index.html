<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="index.css"></head>
<body>
<script type="module">
  // AppTimeout — port of AppTimeout.lua.
  //
  // Every 10s, scan running apps. Any non-ignored regular app that has zero
  // windows AND is not frontmost gets a timestamp. If the same app is still
  // windowless 5 minutes later, kill it. Gaining a window or becoming
  // frontmost cancels the timer. Apps are identified by bundle identifier,
  // not display name — localizedName varies with the system locale.
  //
  // While anything is counting down, a "⌛ N" pill registers into the bar
  // (bar.register plugin API); clicking it pops a native menu that shows
  // remaining time and toggles the protected list, persisted via
  // sd.settings("ignored") as { bundleId: displayName|null }.
  import { sd } from "sd://runtime/api.js";

  const CHECK_INTERVAL_MS = 10_000;
  const TIMEOUT_S         = 300;

  // Seed for first boot only; thereafter sd.settings("ignored") is the
  // truth and the menu edits it. Keyed by bundle identifier, not display
  // name — the Lua original matched on localizedName, which is
  // locale-dependent (on this es-AR system "Calendar" arrives as
  // "Calendario"), so allowed apps failed the check and got killed.
  // Display names stored so apps that aren't running still render
  // readably in the menu.
  const DEFAULT_IGNORED = {
    "com.apple.finder":           "Finder",
    "org.m0k.transmission":       "Transmission",
    "com.apple.iCal":             "Calendar",
    "com.apple.Stickies":         "Stickies",
    "com.spotify.client":         "Spotify",
    "net.whatsapp.WhatsApp":      "WhatsApp",
    "com.apple.ActivityMonitor":  "Activity Monitor",
    "org.hammerspoon.Hammerspoon": "Hammerspoon",
    "com.stackd.daemon":          "stackd",
    "dev.zed.Zed":                "Zed",
    "com.google.antigravity":     "Antigravity",
    "com.apple.dt.Xcode":         "Xcode"
  };

  let ignored = null;                  // bundle id → display name|null

  async function loadIgnored() {
    const saved = await sd.settings.get("ignored");
    if (saved && typeof saved === "object" && !Array.isArray(saved)) {
      ignored = saved;
    } else {
      ignored = { ...DEFAULT_IGNORED };
      await sd.settings.set("ignored", ignored);
    }
  }

  const windowlessSince = new Map();   // bundle id → epoch seconds
  const windowedPids    = new Set();   // pids seen with ≥1 window this session
  const BOOT_S          = Math.floor(Date.now() / 1000);

  // Loop-stop: an app killed repeatedly (a background service respawns it
  // windowless faster than we monitor) is given up on for the session, so
  // we stop fighting it. Session-only and deliberately separate from the
  // persisted `ignored` allowlist — a safety valve, not a user decision.
  const KILL_WINDOW_S = 15 * 60;
  const KILL_LIMIT    = 3;
  const killLog = new Map();           // bundle id → [epoch seconds, ...]
  const gaveUp  = new Set();           // bundle ids we've stopped auto-closing

  // A real, killable app is a `.app` bundle. XPC service helpers live in
  // `.xpc` bundles (inside frameworks) and must never be auto-closed.
  // bundleURL comes from sd.apps.running (daemon exposes it for this).
  const isApp = (app) => typeof app.bundleURL === "string" && app.bundleURL.endsWith(".app");

  function check() {
    const apps = sd.apps.running.value || [];
    const wins = sd.windows.all.value || [];
    // Count by PID rather than display name. kCGWindowOwnerName (what
    // sd.windows.all surfaces as `w.app`) is the *process* name —
    // "Code" for VS Code, "Electron Helper" for some Electron apps —
    // while sd.apps.running's `name` is NSRunningApplication.localizedName
    // ("Visual Studio Code"). Matching on names misses windows for any
    // app where the two diverge and the app would be wrongly considered
    // windowless, then killed mid-session.
    const winCount = new Map();
    for (const w of wins) winCount.set(w.pid, (winCount.get(w.pid) || 0) + 1);

    // Track which processes have ever presented a window this session, and
    // forget dead pids. Only apps that showed a window are candidates for
    // auto-close — a background respawn (new pid, never a window) is left
    // alone, which is what stops the kill/respawn loop.
    for (const pid of winCount.keys()) windowedPids.add(pid);
    const livePids = new Set(apps.map((a) => a.pid));
    for (const pid of windowedPids) if (!livePids.has(pid)) windowedPids.delete(pid);

    const now = Math.floor(Date.now() / 1000);
    const seen = new Set();
    for (const app of apps) {
      // Skipping bundleId-less apps also avoids sd.apps.kill(undefined).
      if (!app.bundleId || ignored[app.bundleId] !== undefined) continue;
      // Equivalent to Hammerspoon's app:kind() == 1: skip accessory
      // (LSUIElement) and prohibited (XPC helper) processes so we don't
      // try to kill Browser Helper / sandbox brokers / etc.
      if (app.activationPolicy !== "regular") continue;
      // Only real .app bundles. XPC service helpers (openAndSavePanelService,
      // QuickLookUIService) live in .xpc bundles and briefly flip to .regular
      // while presenting a panel, so activationPolicy alone lets them through.
      if (!isApp(app)) continue;
      seen.add(app.bundleId);
      const count = winCount.get(app.pid) || 0;
      const isFrontmost = !!app.active;

      // Candidates for auto-close: the process showed a window this session
      // (user actually used it), OR it was already running before this stack
      // booted (left over from before a restart — Preview sat windowless
      // across several reloads and was never cleaned up). What stays gated:
      // a process that LAUNCHED after boot and never presented a window —
      // that's a background service respawn (the Claude kill-loop).
      const preBoot = typeof app.launchedAt === "number" && app.launchedAt < BOOT_S;
      if (count === 0 && !isFrontmost && (windowedPids.has(app.pid) || preBoot) && !gaveUp.has(app.bundleId)) {
        if (!windowlessSince.has(app.bundleId)) {
          windowlessSince.set(app.bundleId, now);
          console.log("apptimeout: monitoring", app.name);
        } else if (now - windowlessSince.get(app.bundleId) >= TIMEOUT_S) {
          console.log("apptimeout: closing", app.name, "(timeout)");
          // Tell undoclose who did it, so its toast can offer to protect
          // this app from future auto-closes (⌘⌥P → apptimeout.protect).
          sd.bang("apptimeout.killed", { bundleId: app.bundleId, name: app.name });
          sd.apps.kill(app.bundleId);
          windowlessSince.delete(app.bundleId);
          // Give up on an app we keep having to kill — something is
          // respawning it, and fighting that is worse than leaving it.
          const hits = (killLog.get(app.bundleId) || []).filter((t) => now - t < KILL_WINDOW_S);
          hits.push(now);
          killLog.set(app.bundleId, hits);
          if (hits.length >= KILL_LIMIT) {
            gaveUp.add(app.bundleId);
            console.log("apptimeout: giving up on", app.name, "— killed", hits.length, "times this session");
          }
        }
      } else if (windowlessSince.has(app.bundleId)) {
        windowlessSince.delete(app.bundleId);
        console.log("apptimeout: stopped monitoring", app.name);
      }
    }
    // Drop entries whose app quit entirely between ticks.
    for (const bundleId of windowlessSince.keys()) {
      if (!seen.has(bundleId)) windowlessSince.delete(bundleId);
    }
    syncPill();
  }

  // undefined = unknown (fresh boot, or the bar just reloaded and lost its
  // externalItems) — distinct from null (known-unregistered) so the first
  // sync after boot clears any pill a previous incarnation left behind.
  let pillLabel;

  function syncPill() {
    const desired = windowlessSince.size ? `{sf:hourglass} ${windowlessSince.size}` : null;
    if (desired === pillLabel) return;
    if (desired === null) {
      sd.bang("bar.unregister", { id: "apptimeout" });
    } else if (pillLabel == null) {
      sd.bang("bar.register", {
        id: "apptimeout",
        side: "center-left",
        order: 58,
        value: desired,
        onClickBang: "apptimeout.menu"
      });
    } else {
      sd.bang("bar.update", { id: "apptimeout", value: desired });
    }
    pillLabel = desired;
  }

  function fmtLeft(sinceEpoch, now) {
    const left = Math.max(0, TIMEOUT_S - (now - sinceEpoch));
    return `${Math.floor(left / 60)}:${String(left % 60).padStart(2, "0")}`;
  }

  // Add a bundle to the protected set (idempotent), cancelling any in-flight
  // countdown for it, and persist. One code path for the menu toggle and the
  // apptimeout.protect bang (fired by undoclose's ⌘⌥P).
  async function protect(bundleId, name) {
    if (!bundleId || ignored[bundleId] !== undefined) return;
    ignored[bundleId] = name || null;
    windowlessSince.delete(bundleId);
    await sd.settings.set("ignored", ignored);
    syncPill();
  }

  sd.bang.declare("apptimeout.menu").on(async () => {
    const apps = sd.apps.running.value || [];
    const now = Math.floor(Date.now() / 1000);
    const nameOf = new Map(apps.filter(a => a.bundleId).map(a => [a.bundleId, a.name]));

    const items = [];
    for (const [bundleId, since] of windowlessSince) {
      items.push({
        id: bundleId,
        title: `${nameOf.get(bundleId) || bundleId} — ${fmtLeft(since, now)} left`
      });
    }
    const running = apps
      .filter(a => a.bundleId && a.activationPolicy === "regular" && isApp(a) && !windowlessSince.has(a.bundleId))
      .sort((a, b) => a.name.localeCompare(b.name));
    if (items.length && running.length) items.push({ separator: true });
    for (const a of running) {
      items.push({ id: a.bundleId, title: a.name, checked: ignored[a.bundleId] !== undefined });
    }
    const absent = Object.keys(ignored).filter(id => !nameOf.has(id)).sort();
    if (absent.length) {
      items.push({ separator: true });
      for (const id of absent) items.push({ id, title: ignored[id] || id, checked: true });
    }

    const picked = await sd.menu.popup(items);
    if (!picked) return;
    if (ignored[picked] !== undefined) {
      const title = nameOf.get(picked) || ignored[picked] || picked;
      delete ignored[picked];
      await sd.settings.set("ignored", ignored);
      console.log("apptimeout: unprotected", title);
      syncPill();
    } else {
      await protect(picked, nameOf.get(picked));
      console.log("apptimeout: protected", nameOf.get(picked) || picked);
    }
  });

  // undoclose's ⌘⌥P after an auto-close: protect the app it just told us
  // about, so it's never auto-closed again.
  sd.bang.declare("apptimeout.protect").on(async ({ bundleId, name } = {}) => {
    if (!bundleId || ignored[bundleId] !== undefined) return;
    await protect(bundleId, name);
    console.log("apptimeout: protected", name || bundleId, "(via undoclose)");
  });

  // The bar re-emits this at its own boot, so registration survives a bar
  // reload regardless of which stack loaded first.
  sd.bang.declare("bar.requestRegister").on(() => {
    pillLabel = undefined;
    syncPill();
  });

  await loadIgnored();
  setInterval(check, CHECK_INTERVAL_MS);
  check();
</script>
</body>
</html>
