<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="index.css"></head>
<body data-theme="{{ sd.appearance.dark ? 'dark' : 'light' }}">
<svg viewBox="0 0 80 80" aria-hidden="true">
  <circle id="ring-fill" cx="40" cy="40" r="30"
          fill="none"
          stroke-width="4"
          stroke-linecap="round"
          pathLength="100"
          stroke-dasharray="0 100"
          transform="rotate(-90 40 40)"/>
  <text id="symbol" x="40" y="40"></text>
</svg>
<script type="module">
  import { sd } from "sd://runtime/api.js";

  // Window is a Liquid Glass disc anchored bottom-center. We hide it at
  // alpha=0 by default and reveal on edge-swipe — sd.window.setAlpha is
  // required because CSS opacity on body wouldn't reach the glass layer
  // (NSGlassEffectView renders independently of WebView contentView alpha).
  sd.window.setAlpha(0);

  const CFG = {
    edgeWidth:    0.002,
    edgePadding:  0.08,
    hudDuration:  1000,
    edges: { left: "brightness", right: "volume" }
  };

  const actions = {
    volume: {
      symbol: "♪",
      apply(level) { return sd.audio.setVolume(level); }
    },
    brightness: {
      symbol: "☀",
      apply(level) {
        const displays = sd.display.all.peek() || [];
        if (!displays.length) return null;
        // Match HS fallback order: builtin flag → name substring
        // ("Built-in" / "Color LCD" / "Internal") → primary display.
        // Never silently no-op mid-swipe.
        const nameRx = /Built-?in|Color LCD|Internal/i;
        const target = displays.find(d => d.builtin)
                    || displays.find(d => nameRx.test(d.name || ""))
                    || displays[0];
        return sd.display.setBrightness(level, { displayId: target.displayID });
      }
    }
  };

  const ringFill  = document.getElementById("ring-fill");
  const symbolEl  = document.getElementById("symbol");

  let cancelHide = null;

  function showHud(symbol, percent) {
    // pathLength=100 normalizes the circumference, so dasharray "X 100" =
    // X% of the ring. transform=rotate(-90) starts the arc at 12 o'clock.
    ringFill.setAttribute("stroke-dasharray", `${percent} 100`);
    symbolEl.textContent = symbol;
    sd.window.setAlpha(1);
    if (cancelHide) cancelHide();
    cancelHide = sd.timer.timeout(() => sd.window.setAlpha(0), CFG.hudDuration);
  }

  function getEdge(x, y) {
    const w = CFG.edgeWidth;
    if (x <= w)     return "left";
    if (x >= 1 - w) return "right";
    if (y <= w)     return "top";
    if (y >= 1 - w) return "bottom";
    return null;
  }

  function isTouching(state) {
    return state !== "ended" && state !== "cancelled" && state !== "lifted";
  }

  const validTouches = new Map();

  sd.touchdevice.subscribe((snap) => {
    if (!snap) return;
    const touches = snap.touches || [];
    const currentIds = new Set();

    for (const t of touches) {
      const id = t.identifier;
      currentIds.add(id);
      if (!isTouching(t.state)) continue;

      const x = t.x, y = t.y;
      const edge = getEdge(x, y);

      if (!validTouches.has(id)) {
        validTouches.set(id, edge || false);
      }
      const activeEdge = validTouches.get(id);
      if (!activeEdge) continue;

      const actionName = CFG.edges[activeEdge];
      const action = actionName && actions[actionName];
      if (!action) continue;

      const pad = CFG.edgePadding;
      const pos = (activeEdge === "left" || activeEdge === "right") ? y : x;
      const percent = Math.max(0, Math.min(100, (pos - pad) / (1 - 2 * pad) * 100));
      action.apply(percent / 100);
      showHud(action.symbol, percent);
      break;
    }

    for (const id of validTouches.keys()) {
      if (!currentIds.has(id)) validTouches.delete(id);
    }
  });
</script>
</body>
</html>
