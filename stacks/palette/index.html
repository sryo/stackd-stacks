<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="index.css">
  <title>Palette</title>
</head>
<body data-theme="dark">
  <!-- Body IS the palette. Daemon owns size, glass material, corner radius
       via manifest. Visibility is controlled by sd.window.invoke / dismiss. -->
  <div class="crumbs" id="crumbs"></div>
  <input id="q" type="text" placeholder="Search…" autocomplete="off" spellcheck="false">
  <div id="results" class="results"></div>
  <div class="footer" id="footer"></div>
  <script type="module">
    // Palette — faithful port of the user's Hammerspoon Palette.
    // Two-stage noun→verb command palette with subsequence matcher + frecency
    // boost + row quickpicks + verb quickpicks. Sources: menuitems / apps /
    // installedapps / calc / shellrunner / files. Verbs: activate / launch /
    // hide / quit / copypath / copynumber / enter / open / reveal / runshell /
    // askmuse.
    //
    // TODO(palette-modularize): this file is ~1100 lines. Split into:
    //   matcher.js  (fuzzyMatch, subtitleScore, rank — pure logic, ~80 LOC)
    //   recents.js  (frecency store + score — ~50 LOC)
    //   sources/<id>.js  (one per source: apps, menuitems, installedapps,
    //                     calc, shellrunner, files)
    //   verbs/<id>.js    (one per verb in VERBS)
    //   main.js     (orchestrates: state machine, render loop, eventtap wiring)
    // Mirrors the lua structure at ~/.hammerspoon/Palette/. Mechanical
    // refactor; deferred because high-risk-low-bug-payoff at session end.
    //
    // Trigger: Ctrl+Cmd+Space hotkey. (HS also opens on TTTaps 5-finger tap;
    // deferred until gesture-payload extension lands.)
    import { sd } from "sd://runtime/api.js";

    // ───────────────────── matcher (port of matcher.lua) ─────────────────────
    const BYPASS_SCORE = 600;
    function isWordBoundary(prev, ch) {
      if (prev == null) return true;
      if (" /._-".indexOf(prev) >= 0) return true;
      if (prev >= "a" && prev <= "z" && ch >= "A" && ch <= "Z") return true;
      return false;
    }
    function fuzzyMatch(q, title) {
      if (!q) return { score: 0, positions: [] };
      if (!title) return null;
      const tl = title.toLowerCase();
      const ql = q.toLowerCase();
      const positions = [];
      let score = 0, ti = 0, consec = 0, firstIdx = null, lastIdx = null;
      for (let qi = 0; qi < ql.length; qi++) {
        const qc = ql[qi];
        let found = false;
        while (ti < tl.length) {
          if (tl[ti] === qc) {
            positions.push(ti);
            const prev = ti > 0 ? title[ti - 1] : null;
            let bonus = 0;
            if (ti === 0) bonus += 25;
            if (isWordBoundary(prev, title[ti])) bonus += 15;
            if (lastIdx != null && (ti - lastIdx) === 1) {
              consec += 1;
              bonus += 8 + consec * 2;
            } else { consec = 0; }
            score += 10 + bonus;
            if (firstIdx == null) firstIdx = ti;
            lastIdx = ti;
            ti += 1;
            found = true;
            break;
          }
          ti += 1;
        }
        if (!found) return null;
      }
      const span = lastIdx - firstIdx + 1;
      score -= Math.floor((span - ql.length) * 1.5);
      if (firstIdx > 0) score -= Math.min(firstIdx, 20);
      if (tl === ql) score += 1000;
      if (tl.startsWith(ql)) score += 200;
      if (score < 1) score = 1;
      return { score, positions };
    }
    function subtitleScore(q, sub) {
      if (!q) return 0;
      if (!sub) return null;
      const s = sub.toLowerCase(), ql = q.toLowerCase();
      if (s === ql) return 600;
      if (s.startsWith(ql)) return 200;
      const pos = s.indexOf(ql);
      if (pos >= 0) return Math.max(0, 100 - pos);
      return null;
    }
    // Source priority. Menu items rank ahead of every other source on ties
    // (user's mental map: the menubar is the primary surface). Order mirrors
    // Palette.config.sources in init.lua:46.
    const SOURCE_PRIORITY = {
      menuitems:     0,
      apps:          1,
      installedapps: 2,
      calc:          3,
      shellrunner:   4,
      files:         5,
      verbs:         6
    };
    function rank(items, q) {
      const empty = q === "";
      const matches = [];
      let nativeIdx = 0;
      for (const item of items) {
        if (empty && item.hideOnEmptyQuery) continue;
        if (item.bypassMatcher) {
          const boost = recents.score(item.source, item.id);
          item.fromHistory = boost > 0;
          item.matchPositions = item.matchPositions || [];
          matches.push({ item, score: BYPASS_SCORE + boost / 100, nativeIdx: nativeIdx++ });
          continue;
        }
        let tScore = null, tPositions = [];
        if (empty) {
          tScore = 0;
        } else {
          const m = fuzzyMatch(q, item.title || "");
          if (m) { tScore = m.score; tPositions = m.positions; }
        }
        let sScore = null;
        if (tScore == null && !empty) sScore = subtitleScore(q, item.subtitle || "");
        const matchVal = tScore != null ? tScore : (sScore != null ? sScore * 0.6 : null);
        const hit = empty || matchVal != null;
        if (hit) {
          const boost = recents.score(item.source, item.id);
          item.fromHistory = boost > 0;
          item.matchPositions = tPositions;
          const total = empty ? boost : matchVal + boost / 10;
          matches.push({ item, score: total, nativeIdx: nativeIdx++ });
        } else {
          item.matchPositions = [];
        }
      }
      // Sort: score desc, then source-priority asc (menubar wins ties), then
      // native order (preserves File → Edit → View menu sequence on empty
      // query). Source priority is what makes menu items rank above apps when
      // both score equal — critical when the user types something that
      // matches a menu and an app title the same way.
      matches.sort((a, b) => {
        if (a.score !== b.score) return b.score - a.score;
        const pa = SOURCE_PRIORITY[a.item.source] ?? 99;
        const pb = SOURCE_PRIORITY[b.item.source] ?? 99;
        if (pa !== pb) return pa - pb;
        return a.nativeIdx - b.nativeIdx;
      });
      return matches.map(m => m.item);
    }

    // ───────────────────── recents (port of recents.lua) ─────────────────────
    const recents = (() => {
      let data = null;
      // Settings key matches the HS spoon (recents.lua:7) so the user's
      // Hammerspoon frecency carries over on first run.
      async function load() {
        if (data) return;
        data = (await sd.settings.get("paletteUsageData")) || {};
      }
      async function save() { await sd.settings.set("paletteUsageData", data); }
      return {
        async init() {
          await load();
          const cutoff = Date.now() / 1000 - 30 * 86400;
          let changed = false;
          for (const src in data) {
            for (const id in data[src]) {
              if (data[src][id].lastUsed < cutoff) {
                delete data[src][id]; changed = true;
              }
            }
            if (Object.keys(data[src]).length === 0) { delete data[src]; changed = true; }
          }
          if (changed) await save();
        },
        record(src, id) {
          if (!src || !id) return;
          data[src] = data[src] || {};
          const e = data[src][id] = data[src][id] || { count: 0, lastUsed: 0 };
          e.count += 1;
          e.lastUsed = Math.floor(Date.now() / 1000);
          save();
        },
        score(src, id) {
          if (!data) return 0;
          const e = data[src] && data[src][id];
          if (!e) return 0;
          const recency = Math.floor(Date.now() / 1000) - e.lastUsed;
          return e.count * 1000000 / (recency + 1);
        },
        entries(src) {
          return (data && data[src]) || {};
        },
        forget(src, id) {
          if (!data || !data[src] || !data[src][id]) return;
          delete data[src][id];
          if (Object.keys(data[src]).length === 0) delete data[src];
          save();
        }
      };
    })();

    // ───────────────────────────── sources ──────────────────────────────────
    const SELF = "stackd";

    // The frontmost app at the *last moment before Palette stole focus*.
    // Once Palette's window invokes, sd.app.frontmost becomes "stackd" —
    // useless for "show me this app's menubar".
    let priorFront = null;
    sd.app.frontmost.subscribe((a) => {
      if (!a || !a.name) return;
      if (a.name === SELF) return;
      priorFront = a;
    });

    // ───────────────── apps source (port of apps.lua) ───────────────────────
    // Running apps with at least one visible window. Subtitle = "N windows"
    // matching HS. visibleWindows is per-pid AX, slowish but n ≤ ~20.
    const appsSource = {
      id: "apps",
      async list() {
        const list = sd.apps.running.value || [];
        const out = [];
        for (const a of list) {
          if (!a.name || !a.bundleId || a.name === SELF) continue;
          if (a.activationPolicy && a.activationPolicy !== "regular") continue;
          let wins = [];
          try { wins = await sd.apps.visibleWindows(a.pid); } catch (e) {}
          const n = Array.isArray(wins) ? wins.length : 0;
          if (n === 0) continue;
          out.push({
            id:          "app:" + a.bundleId,
            title:       a.name,
            subtitle:    n + " window" + (n === 1 ? "" : "s"),
            source:      "apps",
            payload:     { bundleId: a.bundleId, pid: a.pid, appName: a.name },
            defaultVerb: "activate",
            verbs:       ["activate", "hide", "quit", "askmuse"]
          });
        }
        return out;
      }
    };

    // ─────────────── menu-items source (port of menuitems.lua) ──────────────
    // One IPC call to sd.apps.menu(pid) → entire menu tree as nested
    // {title, role, enabled?, marked?, shortcut?, children?} dicts. We flatten
    // it into one Palette item per leaf. Per-app id prefixing so usage counts
    // don't collide (Safari's "File > Save" ≠ Terminal's "File > Save").
    let menuCache = { pid: null, items: null };
    function collectMenuLeaves(node, menuPath, pathList, items) {
      const title = node && node.title;
      if (!title || title === "") {
        // Wrapper without a title — recurse into kids.
        if (node && Array.isArray(node.children)) {
          for (const k of node.children) collectMenuLeaves(k, menuPath, pathList, items);
        }
        return;
      }
      const here = menuPath ? menuPath + " > " + title : title;
      const childPath = pathList.concat([title]);
      if (Array.isArray(node.children) && node.children.length > 0) {
        for (const k of node.children) collectMenuLeaves(k, here, childPath, items);
      } else {
        items.push({
          id:          here,             // app prefix added by caller
          title,
          subtitle:    here,
          source:      "menuitems",
          payload:     { appPid: null, appName: null, path: childPath },
          accessory:   node.shortcut || null,
          enabled:     node.enabled !== false,
          markChar:    node.marked ? "✓" : null,
          defaultVerb: "activate",
          verbs:       ["activate", "askmuse"]
        });
      }
    }
    async function rebuildMenuItems(pid, appName) {
      const tree = await sd.apps.menu(pid);
      if (!tree) return [];
      const tops = Array.isArray(tree.children) ? tree.children : [];
      const items = [];
      // Skip the system Apple menu (always the first top-level child of the
      // AX menubar tree). HS's app:getMenuItems() never returns it — the
      // Apple menu is owned by SystemUIServer, not the frontmost app — so
      // matching HS's surface means walking from topIdx 1 onwards. Without
      // this, "About This Mac" / "Sleep" / "Shut Down" outrank the app's
      // own File / Edit / View entries on shared-letter queries.
      tops.forEach((top, topIdx) => {
        if (topIdx === 0) return;
        collectMenuLeaves(top, null, [], items);
      });
      for (const it of items) {
        it.payload.appPid = pid;
        it.payload.appName = appName;
        it.id = appName + " :: " + it.id;
      }
      return items;
    }
    const menuItemsSource = {
      id: "menuitems",
      async list() {
        const a = priorFront || sd.app.frontmost.peek();
        if (!a || !a.pid || a.name === SELF) return [];
        if (menuCache.pid === a.pid && menuCache.items) return menuCache.items;
        const items = await rebuildMenuItems(a.pid, a.name || "");
        menuCache = { pid: a.pid, items };
        return items;
      }
    };

    // ─────────── installedapps source (port of installedapps.lua) ───────────
    // mdfind for .app bundles. We can't read CFBundleIdentifier from JS
    // without spawning a helper — use the path as the id and the .app stem
    // as the display name. Hidden when query empty so palette doesn't flood.
    let installedCache = [];
    async function rebuildInstalled() {
      const r = await sd.proc.exec("/usr/bin/mdfind",
        ["kMDItemContentType == 'com.apple.application-bundle'"]);
      if (!r || r.code !== 0) return;
      const seen = new Set();
      const out = [];
      for (const path of (r.stdout || "").split("\n")) {
        if (!path || path.indexOf(".app/") >= 0) continue;
        if (path.indexOf("/Library/Application Support/") >= 0) continue;
        if (!path.endsWith(".app")) continue;
        const stem = path.replace(/^.*\//, "").replace(/\.app$/, "");
        if (stem === SELF) continue;
        if (seen.has(path)) continue;
        seen.add(path);
        out.push({ path, name: stem });
      }
      installedCache = out;
    }
    const installedSource = {
      id: "installedapps",
      async list() {
        // HS hides installed apps already running with visible windows. We
        // approximate by skipping anything whose name matches a running app
        // (close enough without bundleID readback).
        const runningNames = new Set((sd.apps.running.value || []).map(a => a.name));
        return installedCache
          .filter(e => !runningNames.has(e.name))
          .map(e => ({
            id:               "installedapp:" + e.path,
            title:            e.name,
            subtitle:         "",
            source:           "installedapps",
            payload:          { path: e.path, appName: e.name },
            defaultVerb:      "launch",
            verbs:            ["launch", "askmuse"],
            hideOnEmptyQuery: true
          }));
      }
    };

    // ─────────────────── calc source (port of calc.lua) ─────────────────────
    // Dynamic: re-evaluated per keystroke. One synthetic row when the query
    // parses as an arithmetic expression.
    function looksMathy(s) {
      if (!/\d/.test(s)) return false;
      if (/[+\-*/%^()]/.test(s)) return true;
      if (s.indexOf(".") >= 0) return true;
      return /\bpi\b|\be\b/i.test(s);
    }
    function evalCalc(src) {
      const cleaned = src.replace(/\s+/g, "");
      // Tight whitelist: digits, math ops, parens, dot, and the letters of pi/e.
      if (!/^[0-9+\-*/%^().pieE]+$/i.test(cleaned)) return null;
      const js = cleaned
        .replace(/\^/g, "**")
        .replace(/\bpi\b/gi, "Math.PI")
        .replace(/\be\b/gi, "Math.E");
      try {
        // eslint-disable-next-line no-new-func
        const v = Function("\"use strict\";return (" + js + ");")();
        if (typeof v !== "number" || !isFinite(v)) return null;
        return v;
      } catch (e) { return null; }
    }
    function formatNumber(n) {
      if (n === Math.floor(n) && Math.abs(n) < 1e15) return String(Math.trunc(n));
      return Number(n.toPrecision(6)).toString();
    }
    const calcSource = {
      id: "calc",
      dynamic: true,
      list(query) {
        const q = (query || "").trim();
        if (!q || !looksMathy(q)) return [];
        const v = evalCalc(q);
        if (v == null) return [];
        const formatted = formatNumber(v);
        return [{
          id:               "calc:active",
          title:            "= " + formatted,
          subtitle:         q,
          source:           "calc",
          payload:          { expression: q, value: v, formatted },
          defaultVerb:      "copynumber",
          verbs:            ["copynumber", "askmuse"],
          hideOnEmptyQuery: true,
          bypassMatcher:    true
        }];
      }
    };

    // ───────────── shellrunner source (port of shellrunner.lua) ─────────────
    // Dynamic: emits "Run shell command" row when query's first token is on
    // $PATH. Cached lookups; fire-and-forget on activate.
    const shellLookupCache = new Map();
    async function isOnPath(token) {
      if (shellLookupCache.has(token)) return shellLookupCache.get(token);
      if (!token || token.indexOf("/") >= 0) { shellLookupCache.set(token, false); return false; }
      try {
        const r = await sd.proc.exec("/usr/bin/env", ["which", token], { timeout: 1 });
        const ok = r && r.code === 0 && (r.stdout || "").trim().length > 0;
        shellLookupCache.set(token, !!ok);
        return !!ok;
      } catch (e) { shellLookupCache.set(token, false); return false; }
    }
    const shellSource = {
      id: "shellrunner",
      dynamic: true,
      async list(query) {
        const q = (query || "").trim();
        if (!q) return [];
        const first = q.match(/^(\S+)/);
        if (!first) return [];
        const ok = await isOnPath(first[1]);
        if (!ok) return [];
        return [{
          id:               "shell:active",
          title:            q,
          subtitle:         "Run shell command",
          source:           "shellrunner",
          payload:          { command: q },
          defaultVerb:      "runshell",
          verbs:            ["runshell", "askmuse"],
          hideOnEmptyQuery: true,
          bypassMatcher:    true
        }];
      }
    };

    // ─────────────────── files source (port of files.lua) ───────────────────
    // Two modes: path mode (query starts with /, ~/, ./) lists directory
    // children filtered by tail. Visited mode (no trigger) pulls dir entries
    // from recents("files").
    let HOME = "";
    (async () => {
      try {
        const r = await sd.proc.exec("/usr/bin/whoami", []);
        if (r && r.code === 0) HOME = "/Users/" + (r.stdout || "").trim();
      } catch (e) {}
    })();
    function expandPath(p) {
      if (p === "~") return HOME;
      if (p.startsWith("~/")) return HOME + p.slice(1);
      if (p.startsWith("./")) return HOME + p.slice(1);
      return p;
    }
    function abbreviatePath(absPath) {
      if (HOME && absPath.startsWith(HOME)) return "~" + absPath.slice(HOME.length);
      return absPath;
    }
    function isPathTrigger(q) {
      return q.startsWith("/") || q.startsWith("~/") || q.startsWith("./");
    }
    const MAX_PATH_RESULTS = 30;
    const MAX_VISITED_RESULTS = 10;
    async function listPathDir(query) {
      const slashAt = query.lastIndexOf("/");
      if (slashAt < 0) return [];
      const dir = query.slice(0, slashAt);
      const tail = query.slice(slashAt + 1);
      let absDir;
      if (dir === "") absDir = "/";
      else if (dir === "~") absDir = HOME;
      else absDir = expandPath(dir);
      if (!absDir) absDir = "/";
      const showHidden = tail.startsWith(".");
      // sd.fs.list is in-process FileManager — no fork+exec per directory.
      const names = (await sd.fs.list(absDir, { hidden: showHidden }).catch(() => null)) || [];
      // Stat first so the sort can promote directories above files at equal
      // score (matches Lua files.lua's tertiary sort key). Doing it inline
      // means we stat all matches, not just the top 30 — acceptable because
      // the fuzzy filter has already culled most names and sd.fs.stat is
      // in-process (FileManager.attributesOfItem), not a subprocess.
      const scored = [];
      for (const name of names) {
        let score = 0, positions = [];
        if (tail !== "") {
          const m = fuzzyMatch(tail, name);
          if (!m) continue;
          score = m.score;
          positions = m.positions;
        }
        const full = absDir === "/" ? "/" + name : absDir + "/" + name;
        const st = await sd.fs.stat(full).catch(() => null);
        const isDir = !!(st && st.isDir);
        scored.push({ name, score, positions, full, isDir });
      }
      scored.sort((a, b) => {
        if (a.score !== b.score) return b.score - a.score;
        if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
        return a.name.localeCompare(b.name);
      });
      const slice = scored.slice(0, MAX_PATH_RESULTS);
      const out = [];
      for (const c of slice) {
        const full = c.full;
        const isDir = c.isDir;
        out.push({
          id:               full,
          title:            c.name,
          subtitle:         abbreviatePath(absDir),
          source:           "files",
          payload:          { path: full, isDir },
          defaultVerb:      isDir ? "enter" : "open",
          verbs:            isDir
                              ? ["enter", "open", "reveal", "copypath", "askmuse"]
                              : ["open", "reveal", "copypath", "askmuse"],
          hideOnEmptyQuery: true,
          bypassMatcher:    true,
          matchPositions:   c.positions
        });
      }
      return out;
    }
    function listVisited(query) {
      if (!query) return [];
      const lower = query.toLowerCase();
      const out = [];
      const ent = recents.entries("files");
      for (const absPath in ent) {
        const base = absPath.split("/").pop() || absPath;
        if (base.toLowerCase().indexOf(lower) >= 0) {
          out.push({
            id:               absPath,
            title:            base,
            subtitle:         abbreviatePath(absPath.replace(/\/[^/]+$/, "") || "/"),
            source:           "files",
            payload:          { path: absPath, isDir: true },
            defaultVerb:      "enter",
            verbs:            ["enter", "open", "reveal", "copypath", "askmuse"],
            hideOnEmptyQuery: true
          });
          if (out.length >= MAX_VISITED_RESULTS) break;
        }
      }
      return out;
    }
    const filesSource = {
      id: "files",
      dynamic: true,
      abbreviatePath,
      async list(query) {
        const q = (query || "").trim();
        if (!q) return [];
        if (isPathTrigger(q)) return await listPathDir(q);
        return listVisited(q);
      }
    };

    // ──────────────────────────── verbs ─────────────────────────────────────
    // keepOpen verbs return { rewriteQuery } to mutate state instead of
    // closing the palette (enter directory).
    const VERBS = {
      activate: {
        id: "activate", label: "Activate",
        async run(item) {
          if (item.source === "menuitems") {
            if (item.enabled === false) return false;
            const pid = item.payload && item.payload.appPid;
            const path = item.payload && item.payload.path;
            if (!pid || !path) return false;
            return await sd.apps.selectMenuItem(pid, path);
          }
          if (item.payload && item.payload.bundleId) {
            return await sd.apps.focus(item.payload.bundleId);
          }
        }
      },
      launch: {
        id: "launch", label: "Launch",
        async run(item) {
          // installedapps: open the .app path. apps: focus by bundleId.
          if (item.payload && item.payload.bundleId) {
            return await sd.apps.launch(item.payload.bundleId);
          }
          if (item.payload && item.payload.path) {
            return await sd.proc.exec("/usr/bin/open", [item.payload.path]);
          }
        }
      },
      hide: {
        id: "hide", label: "Hide",
        async run(item) {
          if (item.payload && item.payload.bundleId) {
            return await sd.apps.hide(item.payload.bundleId);
          }
        }
      },
      quit: {
        id: "quit", label: "Quit",
        async run(item) {
          if (item.payload && item.payload.bundleId) {
            return await sd.apps.kill(item.payload.bundleId);
          }
        }
      },
      copypath: {
        id: "copypath", label: "Copy Path",
        async run(item) {
          const p = item.payload && item.payload.path;
          if (p) await sd.pasteboard.set(p);
        }
      },
      copynumber: {
        id: "copynumber", label: "Copy",
        async run(item) {
          const v = item.payload && (item.payload.formatted || String(item.payload.value));
          if (v != null) await sd.pasteboard.set(String(v));
        }
      },
      enter: {
        id: "enter", label: "Enter", keepOpen: true,
        async run(item) {
          const p = item.payload && item.payload.path;
          if (!p) return null;
          recents.record("files", p);
          return { rewriteQuery: abbreviatePath(p) + "/" };
        }
      },
      open: {
        id: "open", label: "Open",
        async run(item) {
          const p = item.payload && item.payload.path;
          if (!p) return;
          await sd.proc.exec("/usr/bin/open", [p]);
          const parent = p.replace(/\/[^/]+$/, "");
          if (parent) recents.record("files", parent);
        }
      },
      reveal: {
        id: "reveal", label: "Reveal in Finder",
        async run(item) {
          const p = item.payload && item.payload.path;
          if (!p) return;
          await sd.proc.exec("/usr/bin/open", ["-R", p]);
        }
      },
      runshell: {
        id: "runshell", label: "Run",
        async run(item) {
          const cmd = item.payload && item.payload.command;
          if (!cmd) return;
          // Fire-and-forget via zsh -lc (matches runshell.lua).
          sd.proc.exec("/bin/zsh", ["-lc", cmd]).catch(() => {});
        }
      },
      askmuse: {
        id: "askmuse", label: "Ask Muse",
        async run(item) {
          // Port of askmuse.lua. Builds the same "describe" payload
          // (title, distinct subtitle, app name, bundle id) and fires
          // muse.ask — muse stack subscribes via handles: ["muse.ask"].
          if (!item) return false;
          const lines = [];
          if (item.title) lines.push(item.title);
          if (item.subtitle && item.subtitle !== item.title) lines.push(item.subtitle);
          const p = item.payload || {};
          if (p.appName)  lines.push("App: "    + p.appName);
          if (p.bundleId) lines.push("Bundle: " + p.bundleId);
          sd.bang('muse.ask', { context: lines.join("\n") });
        }
      }
    };

    // ───────────────────────────── state ─────────────────────────────────────
    const state = {
      open: false,
      stage: "noun",                   // "noun" | "verb"
      query: "",
      raw: [],
      items: [],
      focused: 0,
      selectedItem: null,
      history: [],
      // Index of the first row currently scrolled into view. Mirrors HS
      // canvas.lua's `scroll = state.scrollOffset`. Bare-digit 1..9 hotkeys
      // pick the Nth row STARTING FROM here, not from absolute index 0 — so
      // as you arrow-scroll past row 9, the numbers shown next to the
      // currently-visible rows still go 1..9 and the hotkeys follow.
      visibleStart: 0,
      // App that owned focus at the moment open() ran. Used by the
      // frontmost-change watcher below to detect "user switched away" and
      // auto-dismiss — the equivalent of init.lua's click-outside dismissTap.
      openOwnerApp: null,
      // Set true one tick after invoke() so the blur listener doesn't
      // dismiss during the panel's own focus handover.
      armedForDismiss: false
    };

    // ────────────────────────────── render ───────────────────────────────────
    const $q = document.getElementById("q");
    const $results = document.getElementById("results");
    const $crumbs = document.getElementById("crumbs");
    const $footer = document.getElementById("footer");

    // Wheel / trackpad scroll: keep the 1..9 badges (and the row-pick
    // hotkey's target window) in sync with what's visible. Arrow-key nav
    // calls updateVisibleNumbers from inside render(), so no double-fire.
    $results.addEventListener("scroll", () => updateVisibleNumbers(), { passive: true });
    // Clicks anywhere on the panel chrome (footer, crumbs, gaps between
    // rows) must not steal focus from the input — otherwise the window-
    // blur dismiss-guard fires while the user thought they were clicking
    // dead space inside the palette. Rows themselves preventDefault their
    // own mousedown (see render() loop).
    document.body.addEventListener("mousedown", (e) => {
      if (e.target === $q) return;
      e.preventDefault();
    });
    const iconCache = new Map();

    function highlightTitle(title, positions) {
      if (!positions || positions.length === 0) return title;
      const out = [];
      const set = new Set(positions);
      for (let i = 0; i < title.length; i++) {
        if (set.has(i)) out.push("<b>" + title[i] + "</b>");
        else out.push(title[i]);
      }
      return out.join("");
    }

    async function iconFor(item) {
      const key = item.id;
      if (iconCache.has(key)) return iconCache.get(key);
      let url = null;
      // Menu items: no icon, matching HS canvas.lua (menuitems.lua sets
      // icon=nil; canvas skips the image element when nil). The result-row
      // slot stays empty so the row's visual weight is the title + path.
      if (item.source === "menuitems") {
        // leave url null
      } else if (item.payload && item.payload.bundleId) {
        url = await sd.icons.app(item.payload.bundleId, { size: 32 });
      } else if (item.payload && item.payload.path) {
        url = await sd.icons.file(item.payload.path, { size: 32 });
      }
      iconCache.set(key, url);
      return url;
    }

    function renderCrumbs() {
      $crumbs.innerHTML = "";
      // Mirrors canvas.lua:359-369 — "Title › Verb-label ›" with a trailing
      // chevron when past noun. Verb-label is only present at the (deferred)
      // prep stage, but the trailing chevron always shows.
      if (state.stage !== "noun" && state.selectedItem) {
        const a = document.createElement("span");
        a.className = "crumb";
        a.textContent = state.selectedItem.title;
        const arrow = document.createElement("span");
        arrow.className = "arrow"; arrow.textContent = "›";
        $crumbs.append(a, arrow);
      }
    }
    // Mirrors canvas.lua:307-315 placeholderFor(state).
    function updatePlaceholder() {
      let p = "Search…";
      if (state.stage === "noun") {
        const appName = (state.openOwnerApp || "").trim();
        if (appName) p = "Search " + appName;
      } else if (state.stage === "verb") {
        p = "Verb…";
      } else {
        p = "Choose…";
      }
      $q.placeholder = p;
    }

    function renderFooter() {
      // Mirrors canvas.lua:317-325 footerFor(state). Short, stage-dependent.
      // Per-verb hotkeys (⌘1..⌘9, ⌘⌫ Forget) live in canvas.lua's right
      // pane; stackd surfaces them in the same footer because we don't have
      // a preview pane, but keeps the count low so the footer doesn't wrap.
      $footer.innerHTML = "";
      const hints = [];
      const item = state.items[state.focused];
      if (state.items.length === 0) {
        if (state.query !== "") hints.push(["↵", "Ask Muse"]);
      } else if (state.stage === "noun") {
        const default_ = (item && item.defaultVerb) || "activate";
        if (item && VERBS[default_]) hints.push(["↵", VERBS[default_].label]);
        let n = 0;
        for (const vid of ((item && item.verbs) || [])) {
          if (vid === default_) continue;
          const v = VERBS[vid];
          if (!v) continue;
          n += 1;
          if (n > 3) break;
          hints.push(["⌘" + n, v.label]);
        }
        if (item && item.fromHistory) hints.push(["⌘⌫", "Forget"]);
        hints.push(["⇥", "verbs"]);
      } else if (state.stage === "verb") {
        hints.push(["↵", "run"]);
        hints.push(["⇧⇥", "back"]);
      }
      hints.push(["esc", state.stage === "noun" ? "close" : "back"]);
      for (const [k, l] of hints) {
        const w = document.createElement("span"); w.className = "hint";
        const kk = document.createElement("kbd"); kk.textContent = k;
        const ll = document.createElement("span"); ll.textContent = " " + l;
        w.append(kk, ll); $footer.append(w);
      }
    }

    function render() {
      renderCrumbs();
      updatePlaceholder();
      $results.innerHTML = "";
      let focusedRow = null;
      // Render every match, not just the first 9. The original cap dropped
      // ~255 of ~264 menu items into the void — the container scrolls but
      // the DOM only had 9 nodes. Alt+1-9 still picks among the first 9
      // (matches HS quickpick semantics); arrow keys scroll through the
      // rest via focusedRow.scrollIntoView below.
      state.items.forEach((item, i) => {
        const row = document.createElement("div");
        row.className = "row" + (i === state.focused ? " selected" : "");
        if (item.enabled === false) row.classList.add("disabled");
        const ic = document.createElement("img"); ic.className = "icon";
        iconFor(item).then(u => { if (u) ic.src = u; });
        // Left blank by default; updateVisibleNumbers() fills 1..9 for the
        // rows currently scrolled into view (see HS canvas.lua:491-499).
        const num = document.createElement("span"); num.className = "num"; num.textContent = "";
        // Menu state mark (✓ on, • current) — canvas.lua:519-527.
        const mark = document.createElement("span"); mark.className = "mark";
        if (item.markChar) mark.textContent = item.markChar;
        const name = document.createElement("span"); name.className = "name";
        name.innerHTML = highlightTitle(item.title, item.matchPositions);
        // Subtitle = menu path (menuitems) / window count (apps) / parent
        // dir (files). Always shown, never replaced by the accessory.
        const sub = document.createElement("span"); sub.className = "sub";
        sub.textContent = item.subtitle || "";
        // History mark — HS canvas.lua:531-538 ("↺" on trailing edge).
        const hist = document.createElement("span"); hist.className = "hist";
        if (item.fromHistory) hist.textContent = "↺";
        // Accessory = menu keyboard shortcut (⌘S etc.) — HS keeps this in
        // the right pane; we don't have one, so trailing-edge text suits.
        const accessory = document.createElement("span"); accessory.className = "accessory";
        if (item.accessory) accessory.textContent = item.accessory;
        row.append(num, ic, mark, name, sub, hist, accessory);
        row.addEventListener("mousedown", (e) => { e.preventDefault(); });
        row.addEventListener("click", () => { state.focused = i; activateFocused(); });
        $results.append(row);
        if (i === state.focused) focusedRow = row;
      });
      // Mirrors clampScroll() in init.lua — keep the highlighted row inside the
      // visible viewport so ↑/↓ never strands the selection off-screen when the
      // results list overflows. `nearest` avoids the jarring center-on-every-keystroke
      // that `smooth`/`center` would cause.
      if (focusedRow) focusedRow.scrollIntoView({ block: "nearest" });
      // scrollIntoView may have changed scrollTop synchronously; update the
      // 1..9 badges + visibleStart pointer now so the row-pick hotkey lines
      // up with what the user actually sees.
      updateVisibleNumbers();
      renderFooter();
    }

    // Mirrors HS canvas.lua's row-number badge: 1..9 reset to the visible
    // window every time the scroll position changes. The .num span on every
    // row is initialized blank (line ~798); this function fills in 1..9 for
    // the nine rows currently scrolled into view and clears the rest.
    // Also latches `state.visibleStart` so bare-digit hotkey N picks the
    // Nth visible row (not the Nth absolute item).
    function updateVisibleNumbers() {
      const rows = $results.querySelectorAll(".row");
      if (rows.length === 0) { state.visibleStart = 0; return; }
      // Row height is fixed at 40px (see .row in index.css). Floor against
      // scrollTop; the first fully-or-partially-visible row at the top of
      // the viewport becomes badge 1.
      const ROW_H = 40;
      const start = Math.max(0, Math.floor($results.scrollTop / ROW_H));
      state.visibleStart = start;
      rows.forEach((row, i) => {
        const num = row.querySelector(".num");
        if (!num) return;
        const visIdx = i - start;
        num.textContent = (visIdx >= 0 && visIdx < 9) ? String(visIdx + 1) : "";
      });
    }

    // ───────────────────────────── stage ops ─────────────────────────────────
    async function buildPool() {
      if (state.stage === "verb") return state.raw;
      const pool = state.raw.slice();
      // Dynamic sources re-evaluate per query.
      const dyn = [calcSource, shellSource, filesSource];
      for (const src of dyn) {
        try {
          const list = await src.list(state.query);
          if (Array.isArray(list)) for (const it of list) pool.push(it);
        } catch (e) { console.error("palette: dynamic source", src.id, e); }
      }
      return pool;
    }
    async function refresh() {
      state.items = rank(await buildPool(), state.query);
      state.focused = Math.min(Math.max(0, state.focused), Math.max(0, state.items.length - 1));
      render();
    }
    function pushStage(newStage, newRaw, opts) {
      state.history.push({
        stage: state.stage, query: state.query, raw: state.raw, items: state.items,
        focused: state.focused, selectedItem: state.selectedItem
      });
      state.stage = newStage;
      state.query = "";
      state.raw = newRaw;
      state.focused = 0;
      if (opts && opts.selectedItem) state.selectedItem = opts.selectedItem;
      $q.value = "";
      $q.setSelectionRange(0, 0);
      refresh();
    }
    function popStage() {
      const prev = state.history.pop();
      if (!prev) return false;
      Object.assign(state, prev);
      $q.value = state.query;
      const n = state.query.length;
      $q.setSelectionRange(n, n);
      render();
      return true;
    }
    function verbItemsFor(item) {
      const declared = item.verbs || [item.defaultVerb || "activate"];
      const out = [];
      for (const vid of declared) {
        const v = VERBS[vid];
        if (v) out.push({
          id: "verb:" + v.id, title: v.label, subtitle: "",
          source: "verbs", payload: { verb: v }, defaultVerb: null,
          matchPositions: []
        });
      }
      return out;
    }
    function advanceFromNoun() {
      if (state.stage !== "noun") return;
      const item = state.items[state.focused];
      if (!item) return;
      const list = verbItemsFor(item);
      if (list.length === 0) return;
      pushStage("verb", list, { selectedItem: item });
    }

    async function runVerb(verb, item) {
      if (!verb || !item) return;
      if (verb.keepOpen) {
        let directive = null;
        try { directive = await verb.run(item); }
        catch (e) { console.error("palette: verb failed", e); }
        recents.record(item.source, item.id);
        recents.record("verb:" + item.source, verb.id);
        if (directive && directive.rewriteQuery != null) {
          state.query = directive.rewriteQuery;
          state.focused = 0;
          $q.value = state.query;
          // Park the caret at end of the rewritten query so the next
          // keystroke continues typing forward (HS: textbuf.charLen).
          const n = state.query.length;
          $q.setSelectionRange(n, n);
          await refresh();
        }
        return;
      }
      try { await verb.run(item); } catch (e) { console.error("palette: verb failed", e); }
      recents.record(item.source, item.id);
      recents.record("verb:" + item.source, verb.id);
      dismiss();
    }

    // Fallback when Enter lands on an empty result list (typed something the
    // matcher rejected). Mirrors init.lua:270-272 / askMuseWithQuery — ship
    // the raw query off to Muse as a free-form question so the user never
    // hits a "nothing to do" dead end.
    async function askMuseWithQuery(query) {
      await runVerb(VERBS.askmuse, { title: query, payload: {}, source: "ask" });
    }
    async function activateFocused() {
      if (state.stage === "noun") {
        if (state.items.length === 0 && state.query !== "") {
          await askMuseWithQuery(state.query);
          return;
        }
        const item = state.items[state.focused];
        if (!item) return;
        const verb = VERBS[item.defaultVerb || "activate"];
        if (verb) await runVerb(verb, item);
      } else if (state.stage === "verb") {
        const row = state.items[state.focused];
        if (!row || !row.payload || !row.payload.verb) return;
        await runVerb(row.payload.verb, state.selectedItem);
      }
    }

    // ──────────────────── mouse-anchored placement ───────────────────────────
    // Mirrors canvas.lua mouseAnchorFrame(). HS cfg: width=500, height=330,
    // leftBoxW=320, pad=16, inputHCompact=36, rowH=48. y-offset = 16+4+36+10+24 = 90.
    // Lands the cursor on row 1's center so scroll / click work without
    // moving the mouse. Clamps inside the cursor's screen with 8px margin.
    const PANEL_W = 800, PANEL_H = 330, LEFT_BOX_W = 520, Y_OFFSET = 90, MARGIN = 8;
    async function placePanel() {
      const m = await sd.mouse.first();
      const scr = m.display || (sd.display.all.peek() || [])[0] || null;
      const sf = scr ? scr.frame : null;
      let x = m.x - LEFT_BOX_W / 2;
      let y = m.y - Y_OFFSET;
      if (sf) {
        if (x < sf.x + MARGIN) x = sf.x + MARGIN;
        if (x + PANEL_W > sf.x + sf.w - MARGIN) x = sf.x + sf.w - PANEL_W - MARGIN;
        if (y + PANEL_H > sf.y + sf.h - MARGIN) y = sf.y + sf.h - PANEL_H - MARGIN;
        if (y < sf.y + MARGIN) y = sf.y + MARGIN;
      }
      await sd.window.setFrame({ x, y, w: PANEL_W, h: PANEL_H });
    }

    // Bar-anchored placement. Used by `sd.bang('palette.open', { under: 'bar' })`
    // — typically a click on the Rebar frontmost-app item. Drops the palette
    // one bar-height below the menubar at the click's x. The gap scales with
    // the bar (vf.y - sf.y), so notched displays (~38px bar) get more
    // breathing room than regular ones (~24px), and the panel never collides
    // with the bar regardless of display.
    async function placePanelUnderBar() {
      const m = await sd.mouse.first();
      const scr = m.display || (sd.display.all.peek() || [])[0] || null;
      const sf = scr ? scr.frame : null;
      const vf = scr ? scr.visibleFrame : null;
      const barH = (sf && vf) ? Math.max(0, vf.y - sf.y) : 24;
      let x = m.x - LEFT_BOX_W / 2;
      let y = (vf ? vf.y : (sf ? sf.y + barH : 0)) + barH;
      if (sf) {
        if (x < sf.x + MARGIN) x = sf.x + MARGIN;
        if (x + PANEL_W > sf.x + sf.w - MARGIN) x = sf.x + sf.w - PANEL_W - MARGIN;
        if (y + PANEL_H > sf.y + sf.h - MARGIN) y = sf.y + sf.h - PANEL_H - MARGIN;
      }
      await sd.window.setFrame({ x, y, w: PANEL_W, h: PANEL_H });
    }

    async function open(opts) {
      // Rebuild the menu tree every open (matches menuitems.lua, which
      // re-walks the AX menu bar each time). Caching across opens would
      // surface stale enabled/marked state when the user toggles "View >
      // Show X" outside the palette and re-opens.
      menuCache = { pid: null, items: null };
      // Snapshot the owner app BEFORE walking the menu (so menuitemsSource
      // and the dismiss watcher agree on which app this session belongs to).
      // Anything else becoming frontmost is a switch-away → dismiss. Fall
      // back to a fresh peek() in case the priorFront subscriber hasn't
      // fired yet (palette opened on launch).
      let owner = (priorFront && priorFront.name) || null;
      if (!owner) {
        const peeked = sd.app.frontmost.peek();
        if (peeked && peeked.name && peeked.name !== SELF) owner = peeked.name;
      }
      state.openOwnerApp = owner;
      // Static sources fan out concurrently.
      const [menuItems, apps, installed] = await Promise.all([
        menuItemsSource.list().catch(() => []),
        appsSource.list().catch(() => []),
        installedSource.list().catch(() => [])
      ]);
      const raw = menuItems.concat(apps).concat(installed);
      state.open = true; state.stage = "noun"; state.query = ""; state.raw = raw;
      state.focused = 0; state.history = []; state.selectedItem = null;
      $q.value = "";
      await refresh();
      // Placement BEFORE invoke so the panel materializes at its final spot
      // — no flash-then-jump. Mirrors canvas.lua's mouseAnchorFrame() called
      // in M.show(). `opts.under === 'bar'` (fired by Rebar's frontmost-app
      // item) snaps below the menubar instead of centering on the cursor.
      if (opts && opts.under === "bar") await placePanelUnderBar();
      else await placePanel();
      await sd.window.invoke();
      $q.focus();
      // Arm the focus-loss dismiss guard one tick AFTER focus lands. Earlier
      // blur transitions during invoke would otherwise dismiss the panel
      // before the user has a chance to type.
      requestAnimationFrame(() => { state.armedForDismiss = true; });
    }
    async function dismiss() {
      state.open = false; state.armedForDismiss = false; state.history = [];
      await sd.window.dismiss();
    }

    // ──────────────────────────── keyboard ────────────────────────────────────
    $q.addEventListener("input", () => { state.query = $q.value; state.focused = 0; refresh(); });
    $q.addEventListener("keydown", async (e) => {
      const item = state.items[state.focused];
      if (e.key === "ArrowDown") { e.preventDefault();
        if (state.focused < state.items.length - 1) { state.focused += 1; render(); }
        return;
      }
      if (e.key === "ArrowUp") { e.preventDefault();
        if (state.focused > 0) { state.focused -= 1; render(); }
        return;
      }
      if (e.key === "Enter") { e.preventDefault(); await activateFocused(); return; }
      if (e.key === "Tab") {
        e.preventDefault();
        if (e.shiftKey) { if (!popStage()) await dismiss(); }
        else {
          // Files-source items: Tab autocompletes the query (HS behavior).
          if (state.stage === "noun" && item && item.source === "files"
              && item.payload && item.payload.path) {
            let nq = abbreviatePath(item.payload.path);
            if (item.payload.isDir) {
              nq += "/";
              recents.record("files", item.payload.path);
            }
            state.query = nq;
            state.focused = 0;
            $q.value = nq;
            $q.setSelectionRange(nq.length, nq.length);
            await refresh();
            return;
          }
          advanceFromNoun();
        }
        return;
      }
      if (e.key === "Escape") { e.preventDefault();
        if (!popStage()) await dismiss();
        return;
      }
      if (e.key === "Backspace" && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        if (state.stage === "noun" && item && item.fromHistory) {
          recents.forget(item.source, item.id);
          refresh();
        }
        return;
      }
      // Cmd+1..9 — pick alternate verb for focused noun.
      if ((e.metaKey || e.ctrlKey) && /^[1-9]$/.test(e.key)) {
        e.preventDefault();
        if (state.stage !== "noun" || !item) return;
        const n = parseInt(e.key, 10);
        const default_ = item.defaultVerb || "activate";
        let count = 0;
        for (const vid of (item.verbs || [])) {
          if (vid === default_) continue;
          count += 1;
          if (count === n) {
            const v = VERBS[vid];
            if (v) await runVerb(v, item);
            return;
          }
        }
        return;
      }
      // Bare 1..9 — pick the Nth visible row and run its default verb.
      // Mirrors keys.lua's itemQuickPick: NO modifier required, and digits
      // are NEVER typed into the query. The HS palette is a global eventtap
      // that owns its own text buffer; this is the closest we can get with
      // an <input>. Trade-off: you can't type "1" into the query — but the
      // user signed off on the HS behavior and this matches it 1:1.
      if (!e.metaKey && !e.ctrlKey && !e.altKey && !e.shiftKey
          && /^[1-9]$/.test(e.key)) {
        e.preventDefault();
        const n = parseInt(e.key, 10);
        // Pick the Nth currently-visible row (relative to scroll), not the
        // Nth absolute item — matches the 1..9 badge user sees on screen.
        const idx = (state.visibleStart || 0) + (n - 1);
        const row = state.items[idx];
        if (!row) return;
        state.focused = idx;
        if (state.stage === "noun") {
          const verb = VERBS[row.defaultVerb || "activate"];
          if (verb) await runVerb(verb, row);
        } else if (state.stage === "verb" && row.payload && row.payload.verb) {
          await runVerb(row.payload.verb, state.selectedItem);
        }
      }
    });

    // ───────────────────────────── lifecycle ──────────────────────────────────
    // Theme: imperative subscription instead of a body-attribute placeholder.
    // The `{{ sd.appearance.dark ? 'dark' : 'light' }}` template eval at mount
    // resolves to 'light' when the appearance channel hasn't pushed yet —
    // which on a dark-mode system left the palette with dark text on dark
    // glass until the first push (sometimes never, racing the WKWebView's
    // initial channel replay). Subscribe explicitly so the body flips as
    // soon as the daemon hands us a value, and again on every system change.
    sd.appearance.subscribe((a) => {
      document.body.dataset.theme = (a && a.dark) ? "dark" : "light";
    });

    sd.hotkey.on("open", () => open());

    // External entry: any stack can fire `sd.bang('palette.open', { under: 'bar' })`
    // — Rebar's frontmost-app item does this on click so the palette drops
    // directly below the menubar instead of jumping to the cursor.
    sd.bang.declare("palette.open").on((detail) => open(detail || {}));

    // Close on focus-loss — two paths, both equivalent to init.lua's
    // dismissTap closing the palette when a click lands outside its frame:
    //
    //   1. Window blur (catches same-app click-outside). The palette runs in
    //      a .nonactivatingPanel, so the prior frontmost app stays frontmost
    //      throughout — clicking into THAT app's window doesn't fire any
    //      app-change notification. But the panel loses key status, and
    //      `window` (the WKWebView's owning NSWindow) fires the JS `blur`
    //      event. We defer the dismiss one tick so a row-click handler can
    //      run first (mousedown → blur → click order means blur races click
    //      otherwise).
    //   2. Frontmost change (catches Cmd+Tab and clicking another app). When
    //      the frontmost app becomes something OTHER than the open-owner and
    //      OTHER than stackd, the user switched away.
    window.addEventListener("blur", () => {
      if (!state.open || !state.armedForDismiss) return;
      setTimeout(() => { if (state.open) dismiss(); }, 0);
    });
    sd.app.frontmost.subscribe((a) => {
      if (!a || !a.name) return;
      if (a.name === SELF) return;
      if (!state.open) return;
      // No baseline owner recorded → don't guess; skip rather than risk
      // dismissing during the palette's own bring-up.
      if (!state.openOwnerApp) return;
      if (a.name === state.openOwnerApp) return;
      dismiss();
    });

    (async () => {
      await recents.init();
      // Fire and forget — mdfind ~500ms; we don't block opening.
      rebuildInstalled();
    })();
  </script>
</body>
</html>
