<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="index.css">
  <title>Undo Close</title>
</head>
<body data-theme="{{ sd.appearance.dark ? 'dark' : 'light' }}">
  <div id="toast" class="toast" aria-hidden="true">
    <span class="grp"><span class="lead">Undo close</span> <span id="label" class="name"></span></span>
    <span class="actions">
      <span class="act"><span class="keys">⌘⌥Z</span> <span class="verb">Reopen</span></span>
      <span id="protect" class="act" hidden><span class="keys">⌘⌥P</span> <span class="verb">Protect</span></span>
    </span>
    <span id="left" class="count">5s</span>
  </div>
  <script type="module">
    // UndoClose — faithful port of UndoClose.lua (sryo).
    //
    // Watches for app terminations + Finder window closes. On either, shows a
    // transient toast at top of screen with a 5-second countdown; ⌘⌥Z within
    // that window relaunches the app, or `open`s the folder. After 5s, hidden.
    // No persistent recents list — just the last thing.
    import { sd } from "sd://runtime/api.js";

    // Window is an anchored glass panel; hidden at alpha=0 by default and
    // revealed per toast. The first setAlpha call disables the daemon's
    // first-paint auto-reveal, so there's no flash at launch.
    sd.window.setAlpha(0);

    const TIMEOUT_S = 5;
    const TOAST_H = 48;
    const TOP_INSET = 80;
    const MIN_W = 240;
    const $toast   = document.getElementById("toast");
    const $label   = document.getElementById("label");
    const $left    = document.getElementById("left");
    const $protect = document.getElementById("protect");

    let armedAction = null;
    let armedDeadline = 0;
    let tickHandle = null;
    // Set to { bundleId, name } only when the current toast is an AppTimeout
    // kill — the ⌘⌥P protect affordance is meaningless for user-quit apps.
    let armedProtect = null;

    function showToast(label) {
      $label.textContent = label;
      // offsetWidth includes the toast's own padding, and flex min-content
      // sizing keeps the nowrap content un-shrunk even when it overflows the
      // current window — so a single measure is correct regardless of the
      // window's prior width. Bridge messages are FIFO, so the resize lands
      // before the reveal.
      const w = Math.max(MIN_W, $toast.offsetWidth);
      const scr = sd.screen.current;
      if (scr) {
        const f = scr.frame;
        sd.window.setFrame({ x: f.x + Math.round((f.w - w) / 2), y: f.y + TOP_INSET, w: w, h: TOAST_H });
      }
      sd.window.setAlpha(1);
    }
    function hideToast() {
      sd.window.setAlpha(0);
      armedAction = null;
      armedDeadline = 0;
      armedProtect = null;
      $protect.hidden = true;
      clearInterval(tickHandle);
      tickHandle = null;
    }
    function tick() {
      const leftMs = armedDeadline - Date.now();
      if (leftMs <= 0) { hideToast(); return; }
      $left.textContent = Math.ceil(leftMs / 1000) + "s";
    }
    function arm(label, action) {
      armedAction = action;
      armedDeadline = Date.now() + TIMEOUT_S * 1000;
      // Default: relaunch-only toast. armProtect re-reveals the segment after.
      armedProtect = null;
      $protect.hidden = true;
      showToast(label);
      $left.textContent = TIMEOUT_S + "s";
      clearInterval(tickHandle);
      tickHandle = setInterval(tick, 250);
    }

    // Same transient toast, but also offers ⌘⌥P to protect the app from
    // future AppTimeout auto-closes. ⌘⌥Z still relaunches via the closure.
    function armProtect(label, bundleId, name) {
      arm(label, async () => { await sd.apps.launch(bundleId); });
      armedProtect = { bundleId, name };
      $protect.hidden = false;
      // Re-measure: the extra segment widens the toast, so recenter.
      showToast(label);
    }

    sd.hotkey.on("undo", async () => {
      if (!armedAction) return;
      const a = armedAction;
      hideToast();
      try { await a(); } catch (e) { console.error("undoclose: action failed", e); }
    });

    sd.hotkey.on("protect", () => {
      if (!armedProtect) return;
      const { bundleId, name } = armedProtect;
      hideToast();
      // AppTimeout owns its allowlist (per-stack settings); ask it to protect.
      sd.bang("apptimeout.protect", { bundleId, name });
    });

    // ──────────────────── AppTimeout-kill detector ───────────────────────────
    // AppTimeout emits apptimeout.killed just before it kills an idle app.
    // This owns the toast for those closes — it's authoritative and doesn't
    // depend on the diff detector's window-history heuristic below (which can
    // miss an app that went windowless before this stack loaded). The bang
    // arrives just before the termination propagates through sd.apps.running,
    // so the mark is set in time for the diff to skip its duplicate toast.
    const TIMED_OUT_TTL_MS = 3000;
    const recentlyTimedOut = new Map();   // bundleId → epoch ms
    function isRecentlyTimedOut(bid) {
      const ts = recentlyTimedOut.get(bid);
      if (ts === undefined) return false;
      if (Date.now() - ts > TIMED_OUT_TTL_MS) { recentlyTimedOut.delete(bid); return false; }
      return true;
    }
    sd.bang.declare("apptimeout.killed").on(({ bundleId, name } = {}) => {
      if (!bundleId) return;
      recentlyTimedOut.set(bundleId, Date.now());
      armProtect(name || bundleId, bundleId, name);
    });

    // ──────────────────── App-terminated detector ────────────────────────────
    // sd.apps doesn't expose a terminated event; diff the running list.
    //
    // Hammerspoon's hs.application.watcher.terminated only fires for real user
    // apps (regular activationPolicy + has been a "proper" app in this session).
    // sd.apps.running emits every NSRunningApplication, including LSUIElement
    // helpers, XPC services, and background processes. To match the Lua's
    // behavior we filter to:
    //   1. activationPolicy === "regular"  (skip accessory/prohibited)
    //   2. has a bundleId                  (skip anonymous helpers)
    //   3. has had at least one on-screen window at some point during its
    //      lifetime — tracked in parallel via sd.windows.all. This filters
    //      out regular-policy processes that never present UI (rare but real,
    //      e.g. some launchers and update helpers).
    const bidsWithWindows = new Set();
    sd.windows.all.subscribe((wins) => {
      if (!wins) return;
      for (const w of wins) {
        // w.app is the app name; we need bundleId. Cross-reference via pid in
        // the current running snapshot — pids are unique per process lifetime.
        // Simpler: just record the pid here, then resolve to bundleId in the
        // running-apps callback below.
        if (w.pid) bidsWithWindows.add(w.pid);
      }
    });

    let prevApps = new Map();   // bundleId → name
    sd.apps.running.subscribe((apps) => {
      if (!apps) return;
      const now = new Map();
      for (const a of apps) {
        if (!a.bundleId) continue;
        if (a.activationPolicy !== "regular") continue;
        // Only track apps that have had a visible window during this session.
        if (!bidsWithWindows.has(a.pid)) continue;
        now.set(a.bundleId, a.name);
      }
      if (prevApps.size > 0) {
        for (const [bid, name] of prevApps) {
          if (!now.has(bid)) {
            // AppTimeout kills are handled by the apptimeout.killed signal
            // above (with the protect affordance); don't double-toast them.
            if (isRecentlyTimedOut(bid)) continue;
            arm(name, async () => { await sd.apps.launch(bid); });
          }
        }
      }
      prevApps = now;
    });

    // ──────────────────── Finder window path tracker ─────────────────────────
    // Per the Lua: track each Finder window's current folder via AppleScript.
    // The Lua keys by hs.window:id() which is a stable CGWindowID; stackd's
    // sd.windows.focused doesn't expose a window id yet (the AX/CG mapping
    // needs _AXUIElementGetWindow private SPI). v0: track only the most
    // recently focused Finder path. Trade-off: if you have multiple Finder
    // windows and close a background one, we offer to reopen the foreground
    // one instead. Good enough until window-id support lands.
    let lastFinderPath = null;
    let captureTimer = null;

    async function captureFinderPath() {
      const r = await sd.proc.exec("/usr/bin/osascript", ["-e",
        'tell application "Finder"\n' +
        '  try\n' +
        '    return POSIX path of (target of front window as alias)\n' +
        '  on error\n' +
        '    return ""\n' +
        '  end try\n' +
        'end tell'
      ]);
      const path = (r && r.stdout || "").trim();
      if (path) lastFinderPath = path;
    }

    sd.windows.focusedChanged.subscribe((w) => {
      if (!w || w.app !== "Finder") return;
      // Match the Lua's 0.2s wait for AppleScript to settle after focus change.
      // focusedChanged (not the union `focused`) so title-only edits don't refire.
      clearTimeout(captureTimer);
      captureTimer = setTimeout(captureFinderPath, 200);
    });

    window.onBang_sd_window_destroyed = (detail) => {
      if (!detail) return;
      if (detail.app === "Finder" && lastFinderPath) {
        const path = lastFinderPath;
        lastFinderPath = null;
        const folderName = (path.replace(/\/$/, "").split("/").pop()) || "Folder";
        arm(`Finder: ${folderName}`, async () => {
          await sd.proc.exec("/usr/bin/open", [path]);
        });
      }
    };
  </script>
</body>
</html>
