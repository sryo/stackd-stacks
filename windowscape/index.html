<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WindowScape</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- The focused-window outline is drawn by the overlay-border stack
       (subscribes to sd.windows.focusedChanged + listens for our
       overlay-border.inclusion bang). This document hosts the snapshot
       strip(s) — bottom-anchored thumbnails of minimized windows.
       snapshots.js builds the strip DOM dynamically into <body>; no
       static markup is needed.

       Panel notes:
         - region:"fullscreen" + display:"primary" → the WebView covers the
           primary display. Strips for other displays will render off-screen
           (documented primitive gap in modules/snapshots.js).
         - clickThrough:true at the window level. snapshots.js flips it to
           false dynamically (sd.mouse-driven, per-tile rects) so DOM
           mousedown on tiles fires while empty screen still passes through
           to the app behind. snapshotsLeftClick eventtap is still used for
           drag-bracket bookkeeping (independent of WebView geometry). -->
  <script type="module" src="./modules/main.js"></script>
</body>
</html>
