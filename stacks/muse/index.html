<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="index.css">
  <title>Muse</title>
</head>
<body>
  <!-- Body IS the panel. Daemon owns the 320x320 size, glass material, and
       12px border-radius via the manifest. Visibility is controlled by the
       invocable lifecycle (sd.window.invoke / dismiss), not CSS. -->
  <div class="input-band">
    <div class="input-wrap">
      <div class="input-placeholder" id="input-placeholder"></div>
      <div class="input" id="input" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="chips">
      <div class="chip-text" id="chip-text" title="text context">T</div>
      <div class="chip-stack" id="chip-stack" data-count="0">
        <span class="more" id="chip-more"></span>
        <img class="s0" id="chip-s0"><img class="s1" id="chip-s1"><img class="s2" id="chip-s2">
      </div>
    </div>
  </div>
  <div class="middle">
    <div class="hints" id="hints">
      <div class="row"><span class="key">⌘⇧S</span> attach</div>
      <div class="row"><span class="key">⌘⇧V</span> paste</div>
      <div class="row"><span class="key">⌘⌫</span> clear</div>
    </div>
    <div class="matrix" id="matrix"></div>
    <div class="spacer"></div>
  </div>
  <div class="output" id="output"></div>

  <script type="module">
    import { sd }       from "sd://runtime/api.js";
    import { backends, pick } from "./backends/index.js";

    const TIMINGS = {
      doubleTapMs:     250,
      continueMs:      600,
      typingPauseMs:   1000,
      successHoldMs:   700,
      cursorBlinkMs:   530,
      pasteInjectMs:   40,
      pasteRestoreMs:  120,
      streamThrottleMs: 33
    };
    const PANEL = 320;
    const ANCHOR_OFFSET = 8;
    const SCREEN_MARGIN = 8;

    const RIGHT_CMD_KEYCODE      = 54;
    const CGEVENT_CMD_FLAG       = 0x100000;

    const $input   = document.getElementById("input");
    const $inputPlaceholder = document.getElementById("input-placeholder");
    const $output  = document.getElementById("output");
    const $chipText  = document.getElementById("chip-text");
    const $chipStack = document.getElementById("chip-stack");
    const $chipMore  = document.getElementById("chip-more");
    const $chipImgs  = [
      document.getElementById("chip-s0"),
      document.getElementById("chip-s1"),
      document.getElementById("chip-s2")
    ];
    const $matrix = document.getElementById("matrix");
    const $hints  = document.getElementById("hints");

    const MATRIX_CELLS = 25;
    const cellEls = [];
    for (let i = 0; i < MATRIX_CELLS; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      $matrix.appendChild(cell);
      cellEls.push(cell);
    }
    const PERIMETER = [0,1,2,3,4, 9,14,19,24, 23,22,21,20, 15,10,5];
    const MATRIX_FRAMES = PERIMETER.map((_, f) => {
      const lit = new Set();
      for (let t = 0; t < 3; t++) {
        const p = ((f - t) % PERIMETER.length + PERIMETER.length) % PERIMETER.length;
        lit.add(PERIMETER[p]);
      }
      return lit;
    });
    const IDLE_MASK   = new Set([12]);
    const CHECK_MASK  = new Set([4, 8, 10, 12, 16]);
    const SAD_MASK    = new Set([6, 8, 16, 17, 18, 20, 24]);
    const CROSS_MASK  = new Set([0, 4, 6, 8, 12, 16, 18, 20, 24]);
    const RETURN_MASK = new Set([9, 11, 14, 15, 16, 17, 18, 21]);
    const SMILEY_MASK = new Set([0, 2, 13, 16, 17]);

    function paintMatrix(mask, klass) {
      for (let i = 0; i < MATRIX_CELLS; i++) {
        cellEls[i].className = "cell" + (mask.has(i) ? (" " + klass) : "");
      }
    }

    let state = {
      open:           false,
      buffer:         "",
      caret:          0,
      response:       "",
      history:        [],
      attachments:    [],
      textContext:    null,
      pendingPrompt:  null,
      capturing:      false,
      streamingCtrl:  null,
      lastClose:      0,
      lastRCmdEdge:   0,
      rCmdHeld:       false,
      statusKind:     "idle",
      statusTimer:    null,
      typingTimer:    null,
      streamThrottle: 0,
      lastSubmittedPrompt: null
    };

    function setStatus(kind, opts) {
      const reposition = opts && opts.reposition;
      if (!reposition && state.statusTimer) { clearInterval(state.statusTimer); state.statusTimer = null; }
      if (state.typingTimer && kind !== "typing") { clearTimeout(state.typingTimer); state.typingTimer = null; }
      state.statusKind = kind;

      if (kind === "thinking") {
        let f = 0;
        paintMatrix(MATRIX_FRAMES[0], "lit");
        if (!reposition) {
          const t0 = Date.now();
          state.statusTimer = setInterval(() => {
            const next = Math.floor((Date.now() - t0) / 100) % MATRIX_FRAMES.length;
            if (next === f) return;
            f = next;
            paintMatrix(MATRIX_FRAMES[f], "lit");
          }, 16);
        }
      } else if (kind === "success") {
        paintMatrix(CHECK_MASK, "lit");
        if (!reposition) {
          state.statusTimer = setTimeout(() => {
            if (state.statusKind === "success") {
              setStatus(hasPasteableResponse() ? "ready" : "idle");
            }
          }, TIMINGS.successHoldMs);
        }
      } else if (kind === "ready")     paintMatrix(RETURN_MASK, "lit");
      else if (kind === "typing")      paintMatrix(SMILEY_MASK, "lit");
      else if (kind === "error")       paintMatrix(CROSS_MASK,  "err");
      else if (kind === "softError")   paintMatrix(SAD_MASK,    "err");
      else                             paintMatrix(IDLE_MASK,   "lit");
    }

    function hasPasteableResponse() {
      for (let i = state.history.length - 1; i >= 0; i--) {
        if (state.history[i].role === "assistant") return true;
      }
      return false;
    }

    function updateReadyState() {
      if (state.streamingCtrl) return;
      let want;
      if (state.buffer !== "")          want = "typing";
      else if (hasPasteableResponse())  want = "ready";
      else                              want = "idle";
      if (state.statusKind === "success" && want === "idle") return;
      if (state.statusKind !== want) setStatus(want);
      if (want === "typing") {
        if (state.typingTimer) clearTimeout(state.typingTimer);
        state.typingTimer = setTimeout(() => {
          if (state.statusKind === "typing") setStatus("ready");
        }, TIMINGS.typingPauseMs);
      }
    }

    function lastReplyPreview(max) {
      for (let i = state.history.length - 1; i >= 0; i--) {
        if (state.history[i].role === "assistant") {
          const s = (state.history[i].content || "").replace(/\s+/g, " ").replace(/^\s+/, "");
          if (s.length === 0) return "";
          if (s.length <= max) return s;
          return s.slice(0, max) + "…";
        }
      }
      return "";
    }

    function placeholderHTML() {
      if (state.streamingCtrl) return `<span style="color:var(--muse-muted)">thinking…</span>`;
      if (state.attachments.length > 0) {
        const s = state.attachments.length === 1 ? "about this image…" : "about these images…";
        return `<span style="color:var(--muse-muted)">${s}</span>`;
      }
      if (state.textContext)           return `<span style="color:var(--muse-muted)">about this selection…</span>`;
      if (state.history.length > 0 && !state.pendingPrompt) {
        const p = lastReplyPreview(50);
        if (!p) return `<span class="accent">↵ to insert</span>`;
        return `<span class="accent">↵ to insert</span><span style="color:var(--muse-muted)">: ${escapeHtml(p)}</span>`;
      }
      return `<span style="color:var(--muse-muted)">ask, summarize, rewrite…</span>`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    // Mirrors HS fitText() (init.lua:947–965): shrink font size by 1px until
    // the rendered content fits inside the element's clientHeight, bottoming
    // out at `minSize`. Uses scrollHeight (the natural content height) as the
    // measurement — same role wrapLines() plays in lua. Caller restores
    // fontSize before measuring so we don't accumulate shrinks across renders.
    function fitText(el, maxSize, minSize) {
      el.style.fontSize = maxSize + "px";
      // clientHeight may be 0 if the element is not yet laid out (e.g. window
      // not visible); bail with the max size in that case.
      const region = el.clientHeight;
      if (region <= 0) return;
      let size = maxSize;
      while (size > minSize && el.scrollHeight > region) {
        size -= 1;
        el.style.fontSize = size + "px";
      }
    }

    function renderInput() {
      if (state.buffer === "") {
        // Native contenteditable: keep $input empty so the browser shows a
        // caret at offset 0, render the placeholder hint in a sibling overlay
        // that's pointer-events:none so clicks fall through to $input.
        if ($input.textContent !== "") $input.textContent = "";
        $inputPlaceholder.innerHTML = placeholderHTML();
        $inputPlaceholder.dataset.on = "1";
      } else {
        // Only write textContent when it actually differs — writing it on
        // every keystroke would collapse the browser's selection back to
        // offset 0 mid-typing.
        if ($input.textContent !== state.buffer) {
          $input.textContent = state.buffer;
          setSelectionOffset($input, state.caret);
        }
        $inputPlaceholder.dataset.on = "0";
        $inputPlaceholder.innerHTML = "";
      }
      fitText($input, 18, 11);

      const n = state.attachments.length;
      $chipStack.dataset.count = String(Math.min(n, 9));
      $chipStack.dataset.overflow = n > 3 ? "1" : "0";
      $chipMore.textContent = n > 3 ? `+${n - 3}` : "";
      for (let slot = 0; slot < 3; slot++) {
        const stepsFromFront = 2 - slot;
        const idx = n - 1 - stepsFromFront;
        const att = (idx >= 0) ? state.attachments[idx] : null;
        if (att && att.dataUrl) {
          $chipImgs[slot].src = att.dataUrl;
          $chipImgs[slot].style.display = "block";
        } else {
          $chipImgs[slot].removeAttribute("src");
          $chipImgs[slot].style.display = "none";
        }
      }

      const hasText = !!(state.textContext && state.textContext.length);
      $chipText.dataset.on = hasText ? "1" : "0";
      $chipText.textContent = hasText
        ? formatCount(countChars(state.textContext))
        : "T";

      $hints.style.display = (state.history.length === 0 && !state.pendingPrompt && !state.streamingCtrl) ? "block" : "none";
    }

    function renderOutput() {
      let content = state.response;
      if (!content) {
        for (let i = state.history.length - 1; i >= 0; i--) {
          if (state.history[i].role === "assistant") { content = state.history[i].content || ""; break; }
        }
      }
      $output.classList.remove("error");
      $output.textContent = content || "";
      // HS fitText for output uses min 12px; max matches the CSS base.
      fitText($output, 18, 12);
    }

    function renderError(message) {
      $output.classList.add("error");
      $output.textContent = message || "";
      fitText($output, 18, 12);
    }

    function countChars(s) {
      return s ? [...s].length : 0;
    }
    function formatCount(n) {
      if (n < 1000) return String(n);
      if (n < 10000) return (n / 1000).toFixed(1) + "k";
      return Math.round(n / 1000) + "k";
    }

    async function anchorPoint() {
      try {
        // System-wide focus (HS-faithful) — covers cross-app cases like the
        // menu bar and system dialogs. Falls through to nil if AX is denied
        // or no element is focused.
        const elH = await sd.ax.focusedElementSystemWide();
        if (typeof elH === "number") {
          let placed = null;
          try {
            const range = await sd.ax.attribute(elH, "AXSelectedTextRange");
            if (range) {
              const b = await sd.ax.parameterizedAttribute(elH, "AXBoundsForRange", range);
              if (rectValid(b)) placed = { x: b.x, y: b.y, w: b.w, h: b.h };
            }
            if (!placed) {
              const frame = await sd.ax.attribute(elH, "AXFrame");
              if (rectValid(frame)) placed = { x: frame.x, y: frame.y, w: frame.w, h: frame.h };
            }
          } finally {
            await sd.ax.release(elH);
          }
          if (placed) return placed;
        }
      } catch (_) {}
      const win = sd.windows.focused.peek();
      if (win && win.frame) {
        const f = win.frame;
        return { x: f.x, y: f.y, w: f.w, h: f.h };
      }
      return null;
    }

    function rectValid(r) {
      return r && typeof r.x === "number" && typeof r.y === "number"
          && (r.w || 0) > 0 && (r.h || 0) > 0;
    }

    async function placePanel(anchor) {
      // Anchor → leadX/trailX/bottom triple. No anchor → fall back to mouse
      // (HS init.lua:441-443). Last-resort fallback is the window's home
      // screen via sd.screen.current, so we never end up with no frame.
      let leadX, trailX, bottom;
      if (anchor) {
        leadX = anchor.x;
        trailX = anchor.x + anchor.w;
        bottom = anchor.y + anchor.h;
      } else {
        const m = sd.mouse.peek();
        if (m) {
          leadX = m.x;
          trailX = m.x;
          bottom = m.y;
        }
      }

      // Pick the screen the ANCHOR lives on — NOT sd.screen.current (which
      // is the panel's home screen, fixed at construction to the manifest's
      // anchor display = primary). On multi-display this was the bug: clamp
      // math forced muse back to the primary even when the user was typing
      // on an external. Mirrors HS init.lua:446-452.
      let scr = (leadX != null && bottom != null) ? sd.display.forPoint(leadX, bottom) : null;
      if (!scr) {
        const m = sd.mouse.peek();
        if (m) {
          scr = sd.display.forPoint(m.x, m.y);
          if (!scr) {
            const all = sd.display.all.peek() || [];
            scr = all[0] || null;
          }
          if (leadX == null) { leadX = m.x; trailX = m.x; bottom = m.y; }
        } else {
          const all = sd.display.all.peek() || [];
          scr = all[0] || null;
        }
      }
      const sf = scr && scr.frame;
      if (!sf) return;
      if (leadX == null) { leadX = sf.x + sf.w / 2 - PANEL / 2; trailX = leadX + PANEL; bottom = sf.y + sf.h / 2 - PANEL / 2; }

      let x = leadX;
      if (x + PANEL > sf.x + sf.w - SCREEN_MARGIN) x = trailX - PANEL;
      if (x < sf.x + SCREEN_MARGIN) x = sf.x + SCREEN_MARGIN;
      if (x + PANEL > sf.x + sf.w - SCREEN_MARGIN) x = sf.x + sf.w - PANEL - SCREEN_MARGIN;

      let yScreen = bottom + ANCHOR_OFFSET;
      if (yScreen + PANEL > sf.y + sf.h - SCREEN_MARGIN) yScreen = sf.y + sf.h - SCREEN_MARGIN - PANEL;
      if (yScreen < sf.y + SCREEN_MARGIN) yScreen = sf.y + SCREEN_MARGIN;

      // sd.window.setFrame takes CG/AX coords (top-left origin) — same
      // convention as the screen frame we just selected.
      await sd.window.setFrame({ x, y: yScreen, w: PANEL, h: PANEL });
    }

    async function readSelectedTextContext() {
      try {
        const ax = await sd.ax.focused();
        if (ax && typeof ax.selectedText === "string" && ax.selectedText.length > 0) {
          return ax.selectedText;
        }
      } catch (_) {}
      return null;
    }

    async function openOverlay(opts) {
      if (state.open) return;
      opts = opts || {};
      const anchor = await anchorPoint();
      await placePanel(anchor);

      state.open = true;
      state.buffer = "";
      state.caret = 0;
      state.response = "";
      state.attachments = [];
      state.textContext = null;
      state.pendingPrompt = null;
      state.statusKind = "idle";
      if (!opts.continued) {
        state.history = [];
        state.lastSubmittedPrompt = null;
      }

      const sel = await readSelectedTextContext();
      if (sel) state.textContext = sel;

      renderInput();
      renderOutput();
      setStatus("idle");
      await sd.window.invoke();
      // Focus has to happen after invoke() — the window isn't keyable until
      // it's shown. Caret lives at offset 0 of an empty $input.
      $input.focus();
      setSelectionOffset($input, 0);
    }

    async function closeOverlay() {
      if (!state.open) return;
      state.open = false;
      if (state.statusTimer)   { clearInterval(state.statusTimer); clearTimeout(state.statusTimer); state.statusTimer = null; }
      if (state.typingTimer)   { clearTimeout(state.typingTimer); state.typingTimer = null; }
      if (state.streamingCtrl) { try { state.streamingCtrl.abort(); } catch (_) {} state.streamingCtrl = null; }
      state.attachments = [];
      state.textContext = null;
      state.pendingPrompt = null;
      state.buffer = "";
      state.caret = 0;
      state.response = "";
      state.lastClose = Date.now();
      await sd.window.dismiss();
    }

    async function commitResponse() {
      let out = state.response;
      if (!out) {
        for (let i = state.history.length - 1; i >= 0; i--) {
          if (state.history[i].role === "assistant") { out = state.history[i].content; break; }
        }
      }
      if (!out) { await closeOverlay(); return; }
      await closeOverlay();
      setTimeout(async () => {
        const saved = await sd.pasteboard.get();
        await sd.pasteboard.set(out);
        await sd.events.key("cmd+v");
        setTimeout(() => {
          // Restore regardless of empty/non-empty (lua parity): an empty
          // clipboard pre-paste should stay empty post-paste, not retain `out`.
          if (typeof saved === "string") sd.pasteboard.set(saved);
        }, TIMINGS.pasteRestoreMs);
      }, TIMINGS.pasteInjectMs);
    }

    async function submitPrompt() {
      const userText = state.buffer;
      if (!userText) return;
      const ctx = state.textContext;
      state.textContext = null;
      let finalPrompt = userText;
      if (ctx) finalPrompt = `<context>\n${ctx}\n</context>\n\n${userText}`;
      const atts = state.attachments;
      state.attachments = [];

      const preferred = (await sd.settings.get("backend")) || "claude";
      const needsVision = atts.length > 0;
      let chosen = await pick(preferred, { needsVision });
      if (!chosen && needsVision) chosen = await pick(preferred);

      if (!chosen) {
        const primary = backends[preferred];
        const a = primary ? await primary.available() : null;
        const why = a && a.reason ? a.reason : `no backend named ${preferred}`;
        const hint = (primary && primary.guidance) || "(no setup hint)";
        renderError(`Set up ${preferred} (${why}):\n${hint}.\n\nOther options live under backends/.`);
        setStatus("softError");
        return;
      }
      const backend = chosen.backend;
      if (needsVision && !backend.multimodal) atts.length = 0;

      state.response = "";
      state.pendingPrompt = userText;
      state.lastSubmittedPrompt = userText;
      state.buffer = "";
      state.caret = 0;
      renderInput();
      renderOutput();
      setStatus("thinking");

      const ctrl = new AbortController();
      state.streamingCtrl = ctrl;
      state.streamThrottle = 0;
      try {
        for await (const chunk of backend.stream({
          prompt:      finalPrompt,
          history:     state.history,
          attachments: atts,
          signal:      ctrl.signal
        })) {
          state.response += chunk;
          const now = Date.now();
          if (now - state.streamThrottle >= TIMINGS.streamThrottleMs) {
            state.streamThrottle = now;
            renderOutput();
          }
        }
        renderOutput();
        state.history.push({ role: "user",      content: finalPrompt });
        state.history.push({ role: "assistant", content: state.response });
        state.response = "";
        state.pendingPrompt = null;
        renderInput();
        renderOutput();
        setStatus("success");
      } catch (e) {
        if (e && e.name === "AbortError") return;
        setStatus("error");
        const msg = (e && e.message) ? e.message : String(e);
        renderError(`Muse [${chosen.name}]: ${msg.slice(0, 200)}`);
        await sd.fs.write(
          "~/.config/muse/muse.log",
          `[${new Date().toISOString()}] ERROR backend=${chosen.name} prompt=${JSON.stringify(finalPrompt.slice(0, 500))} err=${msg}\n`
        );
      } finally {
        if (state.streamingCtrl === ctrl) state.streamingCtrl = null;
      }
    }

    async function captureRegion() {
      if (state.capturing || !state.open) return;
      state.capturing = true;
      const path = `/tmp/muse-cap-${Date.now()}.png`;
      // Hide the panel during screencapture so it doesn't appear in the
      // grab. style.visibility on a now-bodyless wrapper would have nothing
      // to hide; sd.window.setAlpha fades the whole window (glass + content)
      // which is what we actually want anyway.
      await sd.window.setAlpha(0);
      try {
        const r = await sd.proc.exec("/usr/sbin/screencapture", ["-i", "-x", "-t", "png", path], { timeout: 60 });
        if (r && r.code === 0) {
          const enc = await sd.proc.exec("/usr/bin/base64", ["-i", path], { timeout: 5 });
          if (enc && enc.code === 0 && enc.stdout) {
            const b64 = enc.stdout.replace(/\s+/g, "");
            state.attachments.push({
              mime:   "image/png",
              base64: b64,
              dataUrl: `data:image/png;base64,${b64}`
            });
            renderInput();
          }
          await sd.proc.exec("/bin/rm", ["-f", path]);
        }
      } finally {
        await sd.window.setAlpha(1);
        state.capturing = false;
      }
    }

    async function pasteContext() {
      if (!state.open) return;
      const clip = await sd.pasteboard.get();
      if (clip && typeof clip === "string" && clip.length > 0) {
        state.textContext = clip;
        renderInput();
      }
    }

    function clearAttachments() {
      if (!state.open) return;
      if (state.attachments.length === 0 && !state.textContext) return;
      state.attachments = [];
      state.textContext = null;
      renderInput();
    }

    // ----- Native caret bridging -----
    //
    // The input is a contenteditable div. The browser owns rendering of the
    // caret, the selection, word-by-word navigation (Alt+arrows), line-edge
    // nav (Cmd+arrows), word-delete (Alt+Backspace), and Cmd+A — all for
    // free. We just read its state after every event and mirror it into
    // state.buffer / state.caret, which the rest of the stack already relies
    // on. Reading offsets means walking the text nodes because contenteditable
    // ranges are (node, offset) pairs, not flat string offsets.
    function getInputText() {
      // textContent collapses across nested nodes — fine here because $input
      // only ever contains plain text (no <br>, no nested spans) since we
      // assign via .textContent and never .innerHTML for buffer content.
      return $input.textContent || "";
    }

    function getSelectionOffset(el) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return 0;
      const range = sel.getRangeAt(0);
      // Only trust the selection if it's actually inside the input.
      if (!el.contains(range.endContainer) && range.endContainer !== el) return 0;
      const pre = range.cloneRange();
      pre.selectNodeContents(el);
      pre.setEnd(range.endContainer, range.endOffset);
      return pre.toString().length;
    }

    function setSelectionOffset(el, offset) {
      const text = el.firstChild;
      const range = document.createRange();
      const sel = window.getSelection();
      if (text && text.nodeType === Node.TEXT_NODE) {
        const len = text.nodeValue.length;
        const o = Math.max(0, Math.min(offset, len));
        range.setStart(text, o);
        range.setEnd(text, o);
      } else {
        range.setStart(el, 0);
        range.setEnd(el, 0);
      }
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function syncFromDOM() {
      state.buffer = getInputText();
      state.caret = getSelectionOffset($input);
    }

    sd.appearance.subscribe((a) => {
      const dark = !!(a && a.dark);
      document.documentElement.dataset.dark = dark ? "1" : "0";
    });

    // External-stack entry point. Other stacks (palette's askmuse verb,
    // future hotkey stacks, etc.) fire sd.bang('muse.ask', { context })
    // to open Muse with pre-attached text context. Sets state.textContext
    // then invokes the panel.
    window.onBang_muse_ask = async (detail) => {
      const ctx = detail && typeof detail.context === "string" ? detail.context : "";
      state.textContext = ctx || null;
      renderInput();
      if (!state.open) {
        await sd.window.invoke();
      }
    };

    sd.events.on("flags", (e) => {
      if (!e || e.keyCode !== RIGHT_CMD_KEYCODE) return;
      const downNow = (e.flags & CGEVENT_CMD_FLAG) !== 0;
      const now = Date.now();
      if (downNow && !state.rCmdHeld) {
        state.rCmdHeld = true;
        const elapsed = now - state.lastRCmdEdge;
        if (state.lastRCmdEdge > 0 && elapsed <= TIMINGS.doubleTapMs) {
          state.lastRCmdEdge = 0;
          if (state.open) {
            closeOverlay();
          } else {
            const continued = state.history.length > 0 && (now - state.lastClose) <= TIMINGS.continueMs;
            openOverlay({ continued });
          }
        } else {
          state.lastRCmdEdge = now;
        }
      } else if (!downNow && state.rCmdHeld) {
        state.rCmdHeld = false;
        state.lastRCmdEdge = now;
      }
    });

    // Key handling strategy: intercept only the Muse-specific chords + Enter
    // + Escape. Everything else (printable input, Backspace, Delete, arrows,
    // Cmd/Alt+arrows, Cmd+A, Alt+Backspace, etc.) is passed through to the
    // browser's contenteditable, which knows macOS conventions. We then sync
    // state.buffer + state.caret from the resulting DOM via the `input` and
    // `selectionchange` listeners below.
    document.addEventListener("keydown", async (e) => {
      if (!state.open) return;
      if (e.key === "Escape") {
        e.preventDefault();
        await closeOverlay();
        return;
      }
      // In-overlay chords (only active while open). Mirrors the lua source,
      // which registers these inside its input eventtap — NOT as global
      // hotkeys — so cmd+backspace etc. reach the focused app normally when
      // Muse is closed.
      if (e.metaKey && e.shiftKey && !e.ctrlKey && !e.altKey && (e.key === "s" || e.key === "S")) {
        e.preventDefault();
        await captureRegion();
        return;
      }
      if (e.metaKey && e.shiftKey && !e.ctrlKey && !e.altKey && (e.key === "v" || e.key === "V")) {
        e.preventDefault();
        await pasteContext();
        return;
      }
      if (e.metaKey && !e.shiftKey && !e.ctrlKey && !e.altKey && (e.key === "Backspace" || e.key === "Delete")) {
        e.preventDefault();
        clearAttachments();
        return;
      }
      if (e.key === "Enter" && !e.metaKey && !e.ctrlKey && !e.altKey && !e.shiftKey) {
        e.preventDefault();
        if (state.streamingCtrl) return;
        if (state.buffer !== "") await submitPrompt();
        else                     await commitResponse();
        return;
      }
      // Block Cmd+V (system paste) and Cmd+X — the user-visible paste verb is
      // Cmd+Shift+V (handled above) which sets textContext, not buffer. Cmd+C
      // is allowed so users can copy selected input.
      if (e.metaKey && !e.shiftKey && !e.ctrlKey && !e.altKey && (e.key === "v" || e.key === "V" || e.key === "x" || e.key === "X")) {
        e.preventDefault();
        return;
      }
      // Everything else flows to the contenteditable handler. The `input`
      // listener below syncs state.buffer + state.caret from the new DOM.
    });

    // Browser fires `input` after the contenteditable mutation has landed —
    // textContent and selectionStart are already up-to-date here.
    $input.addEventListener("input", () => {
      if (!state.open) return;
      syncFromDOM();
      // If buffer just became empty we need to swap to placeholder rendering,
      // and vice versa. renderInput handles both transitions.
      renderInput();
      updateReadyState();
    });

    // Arrow keys and clicks move the caret without firing `input`. Listen to
    // selectionchange (document-level only event) and update state.caret so
    // the rest of the stack (anything that reads state.caret) stays consistent.
    document.addEventListener("selectionchange", () => {
      if (!state.open) return;
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      const r = sel.getRangeAt(0);
      if ($input.contains(r.endContainer) || r.endContainer === $input) {
        state.caret = getSelectionOffset($input);
      }
    });

    // After invoke(), the browser doesn't auto-focus contenteditable. Force
    // it so keystrokes land in the input and the caret is visible.
    $input.addEventListener("mousedown", () => { /* let click position caret */ });

    window.addEventListener("blur", () => {
      if (state.open && !state.capturing) closeOverlay();
    });
  </script>
</body>
</html>
